# 03 — Nightly credential + Dev Hub health check.
#
# Catches the failures that otherwise ambush you mid-PR:
#   * the JWT certificate expired, or was removed from the ECA
#   * the integration user was deactivated or lost its permission set
#   * the Dev Hub is out of active-scratch capacity
#
# It provisions the smallest possible org and immediately deletes it, so the cost is
# one scratch signup per day against your daily limit.
#
# SECRETS REQUIRED (repo-level):  SF_CLIENT_ID, SF_USERNAME, SF_JWT_KEY

name: Scratch credential health check

on:
  schedule:
    - cron: '0 6 * * 1-5'   # 06:00 UTC, weekdays
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
      SF_USERNAME: ${{ secrets.SF_USERNAME }}
      SF_JWT_KEY: ${{ secrets.SF_JWT_KEY }}
      SF_LOGIN_URL: ${{ vars.SF_LOGIN_URL || 'https://login.salesforce.com' }}
      SCRATCH_DURATION_DAYS: '1'
      # Skip package installs — this is a credential check, not a full build.
      SCRATCH_SKIP_PACKAGES: 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }

      - name: Minimal scratch definition
        run: |
          mkdir -p config
          echo '{"orgName":"credential health check","edition":"Developer"}' > config/healthcheck-def.json

      - name: Provision (proves JWT + Dev Hub capacity)
        id: scratch
        env:
          SCRATCH_DEF_PATH: config/healthcheck-def.json
        run: node scripts/ci/provision-scratch.mjs provision

      - name: Delete immediately
        if: always() && steps.scratch.outputs.org_id != ''
        run: node scripts/ci/provision-scratch.mjs delete --org-id "${{ steps.scratch.outputs.org_id }}"

      - name: Explain a failure
        if: failure()
        run: |
          {
            echo "### Scratch credential check failed :warning:"
            echo ""
            echo "Most likely causes, in order:"
            echo "1. **JWT certificate expired or removed** from the External Client App."
            echo "2. **Integration user** deactivated, or lost the app assignment / \`Create and Manage Scratch Orgs\`."
            echo "3. **Dev Hub at capacity** — check active + daily scratch limits."
            echo "4. \`SF_LOGIN_URL\` wrong — sandboxes need \`https://test.salesforce.com\`."
          } >> "$GITHUB_STEP_SUMMARY"
